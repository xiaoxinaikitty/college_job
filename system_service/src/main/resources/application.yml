server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/college_job?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

auth:
  jwt-secret: "replace-with-your-very-long-jwt-secret-key-at-least-32-bytes"
  jwt-expire-seconds: 7200


